# ============================================================
# pipelines/deploy-api.yml
# Build & Deploy der .NET API (bei jedem Push auf main)
# Voraussetzungen in Azure DevOps:
#   - Service Connection 'SC-Azure-ManagedIdentity' (Managed Identity, Contributor auf RG)
#   - Service Connection 'SC-ACR-ManagedIdentity'   (Managed Identity, AcrPush auf ACR)
#   - Variable Group 'vg-energy-prod' (siehe variables-template.yml)
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - modules/**
      - main.bicep
      - main.bicepparam
      - pipelines/deploy-infra.yml
      - README.md

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: vg-energy-prod
  - name: RESOURCE_GROUP
    value: 'rg-energy-prod'
  - name: IMAGE_NAME
    value: 'energy/api'
  - name: IMAGE_TAG
    value: '$(Build.BuildId)'

stages:

# ----------------------------------------------------------------
# Stage 1: Build & Push Docker Image
# ----------------------------------------------------------------
- stage: Build
  displayName: 'Build & Push Image'
  jobs:
  - job: BuildAndPush
    displayName: 'Docker Build & Push to ACR'
    steps:

    - task: Docker@2
      displayName: 'Docker Build & Push'
      inputs:
        containerRegistry: 'SC-ACR-ManagedIdentity'
        repository: '$(IMAGE_NAME)'
        command: buildAndPush
        Dockerfile: '**/Dockerfile'
        tags: |
          $(IMAGE_TAG)
          latest
        # Best Practice: nur production stage bauen
        buildContext: '.'
        arguments: '--target production'

    - task: AzureCLI@2
      displayName: 'Image auf Vulnerabilities scannen (Defender)'
      inputs:
        azureSubscription: 'SC-Azure-ManagedIdentity'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Image: $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)"
          # Microsoft Defender for Containers scannt automatisch nach Push.
          # Hier kannst du optional auf Scan-Ergebnis warten (z.B. via Defender API).
          echo "Scan wird asynchron von Microsoft Defender for Containers durchgefuehrt."

# ----------------------------------------------------------------
# Stage 2: Deploy auf Azure Container Apps
# ----------------------------------------------------------------
- stage: Deploy
  displayName: 'Deploy to Container Apps'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToACA
    displayName: 'Update Container App'
    environment: 'production'   # <-- Approval Gate in Azure DevOps konfigurieren!
    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureCLI@2
            displayName: 'Container App aktualisieren'
            inputs:
              azureSubscription: 'SC-Azure-ManagedIdentity'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(CONTAINER_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --image $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)

          - task: AzureCLI@2
            displayName: 'Deployment Ergebnis pruefen (Health Check)'
            inputs:
              azureSubscription: 'SC-Azure-ManagedIdentity'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Warte auf aktive Revision..."
                for i in {1..12}; do
                  STATUS=$(az containerapp revision list \
                    --name $(CONTAINER_APP_NAME) \
                    --resource-group $(RESOURCE_GROUP) \
                    --query "[?properties.active==\`true\`].properties.healthState" \
                    --output tsv | head -1)

                  echo "Status: $STATUS"
                  if [ "$STATUS" == "Healthy" ]; then
                    echo "Deployment erfolgreich - App ist Healthy!"
                    exit 0
                  fi
                  sleep 10
                done
                echo "WARNUNG: Health-Check Timeout. Bitte manuell pruefen."
                exit 1

          - task: AzureCLI@2
            displayName: 'Deployment-Info ausgeben'
            condition: succeeded()
            inputs:
              azureSubscription: 'SC-Azure-ManagedIdentity'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                FQDN=$(az containerapp show \
                  --name $(CONTAINER_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --query properties.configuration.ingress.fqdn \
                  --output tsv)
                echo "App erreichbar unter: https://$FQDN"
